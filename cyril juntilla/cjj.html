!DOCTYPE html>
<html>
<head>
    <title>Profile Overview</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#e5e5e5;
            margin:0;
        }

        .container{
            width:80%;
            margin:30px auto;
            background:white;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .header{
            height:220px;
            background:url('cover.jpg');
            background-size:cover;
            background-position:center;
            position:relative;
        }

        .profile-pic{
            width:120px;
            height:120px;
            border-radius:50%;
            border:5px solid white;
            position:absolute;
            left:50px;
            bottom:-60px;
        }

        .content{
            padding:80px 50px 50px;
        }

        h2{
            margin-bottom:5px;
        }

        .info{
            color:gray;
            margin-bottom:30px;
        }

        .form-row{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        .form-group{
            flex:1;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        button{
            background:#4CAF50;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <img src="C:\Users\deped\Desktop\cyril juntilla//cyril.jpg" class="profile-pic" alt="Profile">
    </div>

    <div class="content">
        <h2>Cyril Jane Juntilla</h2>
        <p class="info">Student, 17 years old</p>

        <h3>Personal Details</h3>

        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="cyril">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="juntilla">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" placeholder="+09629096708">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="cyriljanejuntilla2929@gmail.com">
            </div>
        </div>

        <div class="form-group">
            <label>Student ID</label>
            <input type="text" placeholder="129381140241">
        </div>

        <br>
        <button>Save Change</button>

    </div>

</div>

</body>
</html>
